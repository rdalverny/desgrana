name: Builds macOS & Linux

on:
  push:
    tags: ['*']
  workflow_dispatch:

jobs:

  # ── macOS (Apple Silicon) ───────────────────────────────────────────────────
  # Signing and notarization are done locally; this job only verifies the build.

  macos:
    name: macOS App & CLI
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v6

      - name: Build CLI + App
        run: |
          cd desgrana
          swift build -c release --product desgrana
          swift build -c release --product DesgranaApp

  # ── Linux: build binaries (amd64 + arm64) ──────────────────────────────────
  # Compiles CLI + Qt GUI inside the official Swift Docker image.
  # Outputs raw binaries + bundled Swift libs as a CI artifact.

  linux-build:
    name: Linux build (${{ matrix.deb_arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            deb_arch: amd64
          - platform: linux/arm64
            deb_arch: arm64

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build binaries
        run: |
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --target binaries \
            -f packaging/linux/deb/builder.dockerfile \
            --output type=local,dest=binaries \
            .

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: linux-binaries-${{ matrix.deb_arch }}
          path: binaries/

  # ── Linux: package .deb (amd64 + arm64) ────────────────────────────────────
  # Takes pre-built binaries and runs dpkg-buildpackage in a lean Debian image.
  # No Swift toolchain needed here — packaging only.

  linux-deb:
    name: Linux .deb (${{ matrix.deb_arch }})
    needs: linux-build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            deb_arch: amd64
          - platform: linux/arm64
            deb_arch: arm64

    steps:
      - uses: actions/checkout@v6

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: linux-binaries-${{ matrix.deb_arch }}
          path: binaries/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build .deb
        run: |
          docker buildx build \
            --platform ${{ matrix.platform }} \
            -f packaging/linux/deb/packager.dockerfile \
            --output type=local,dest=dist \
            .

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: desgrana-deb-${{ matrix.deb_arch }}
          path: dist/*.deb

  # ── Windows CLI (x64) ───────────────────────────────────────────────────────
  # Disabled: setup-swift@v2 does not support Swift 6.x on Windows;
  # setup-swift@v3 (beta) does not support Windows yet either.
  # Re-enable once a reliable Swift install method for Windows CI is confirmed.
