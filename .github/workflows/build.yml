name: Builds

on:
  push:
    tags: ['*']
  workflow_dispatch:
    inputs:
      only:
        description: Which platform jobs to run
        type: choice
        options: [all, macos, linux, windows]
        default: all

jobs:

  # ── macOS (Apple Silicon) ───────────────────────────────────────────────────
  # Signing and notarization are done locally; this job only verifies the build.

  macos:
    name: macOS App & CLI
    if: github.event_name != 'workflow_dispatch' || inputs.only == 'all' || inputs.only == 'macos'
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history + tags for `make buildinfo` (git describe)

      - name: Generate BuildInfo.swift
        run: make buildinfo

      - name: Build CLI + App
        run: |
          cd desgrana
          swift build -c release --product desgrana
          swift build -c release --product DesgranaApp

      - name: Upload CLI
        uses: actions/upload-artifact@v7
        with:
          name: desgrana-${{ github.run_id }}-macos-cli
          path: desgrana/.build/release/desgrana

  # ── Linux: build binaries + package .deb + .rpm ────────────────────────────
  # Each arch runs on a native runner — no QEMU, no cross-compilation.
  # arm64 runners are available for public repos (GitHub-hosted, public preview).

  linux-package:
    name: Linux package (${{ matrix.deb_arch }})
    if: github.event_name != 'workflow_dispatch' || inputs.only == 'all' || inputs.only == 'linux'
    runs-on: ${{ matrix.runs_on }}
    strategy:
      matrix:
        include:
          - runs_on: ubuntu-24.04
            deb_arch: amd64
            rpm_arch: x86_64
          - runs_on: ubuntu-24.04-arm
            deb_arch: arm64
            rpm_arch: aarch64

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate BuildInfo.swift
        run: make buildinfo

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build binaries
        run: |
          docker buildx build \
            --target binaries \
            -f packaging/linux/deb/builder.dockerfile \
            --cache-from type=gha,scope=linux-${{ matrix.deb_arch }} \
            --cache-to   type=gha,scope=linux-${{ matrix.deb_arch }},mode=max \
            --output type=local,dest=binaries \
            .

      - name: Build .deb
        run: |
          docker buildx build \
            -f packaging/linux/deb/packager.dockerfile \
            --output type=local,dest=dist \
            .

      - name: Build .rpm
        run: |
          docker buildx build \
            --build-arg TARGET_ARCH=${{ matrix.rpm_arch }} \
            -f packaging/linux/rpm/packager.dockerfile \
            --output type=local,dest=dist \
            .

      - name: Upload .deb
        uses: actions/upload-artifact@v7
        with:
          name: desgrana-${{ github.run_id }}-linux-${{ matrix.deb_arch }}
          path: dist/*.deb

      - name: Upload .rpm
        uses: actions/upload-artifact@v7
        with:
          name: desgrana-${{ github.run_id }}-linux-${{ matrix.rpm_arch }}.rpm
          path: dist/*.rpm

  # ── Windows GUI (Qt, x64) ───────────────────────────────────────────────────
  # DRAFT — needs CI iteration. The Swift side is built as a DLL; the Qt C++ links
  # its import library. (-static-stdlib was dropped: it can't load the stdlib for
  # the Windows toolchain, so the Swift runtime DLLs will need bundling alongside.)
  # Next unknowns to validate: that SwiftPM exports the @_cdecl symbols in the
  # import library, and the exact install-qt-action version/arch below.
  windows-gui:
    name: Windows GUI (Qt, x64)
    if: github.event_name != 'workflow_dispatch' || inputs.only == 'all' || inputs.only == 'windows'
    runs-on: windows-latest
    steps:
      - uses: compnerd/gha-setup-swift@main
        with:
          swift-version: swift-6.4.x-branch
          swift-build: 6.4.x-DEVELOPMENT-SNAPSHOT-2026-06-01-a

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'              # to confirm: a Qt 6.x published for win64_msvc
          arch: win64_msvc2022_64       # to confirm against the chosen version

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate BuildInfo.swift
        shell: bash
        run: |
          mkdir -p desgrana/Sources/Core
          cat > desgrana/Sources/Core/BuildInfo.swift <<EOF
          // Generated in CI — do not edit.
          public enum BuildInfo {
              public static let version = "$(cat VERSION)"
              public static let gitSHA = "$(git rev-parse HEAD)"
              public static let gitDescribe = "$(git describe --tags --always --dirty)"
              public static let gitDirty = false
              public static let buildDate = "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
              public static let swiftVersion = "$(swift --version | head -1 | tr -d '"\\')"
              public static let toolchain = "x86_64-unknown-windows-msvc"
          }
          EOF

      - name: Build Swift bridge (DLL)
        shell: bash
        run: cd desgrana && swift build -c release --product DesgranaBridge

      # windows-latest has MinGW on PATH; without this CMake picks g++ and the
      # GCC-ABI link fails against the MSVC Qt + Swift libs. Force the MSVC env.
      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build Qt GUI
        shell: cmd
        run: |
          cmake -S qt -B qt/build -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_C_COMPILER=cl ^
            -DCMAKE_CXX_COMPILER=cl ^
            -DCMAKE_PREFIX_PATH="%QT_ROOT_DIR%" ^
            -DSWIFT_BUILD_DIR=%CD%/desgrana/.build/release
          cmake --build qt/build

      - name: Bundle app (Qt + Swift runtime)
        shell: cmd
        run: |
          mkdir dist\desgrana
          copy /Y qt\build\desgrana-gui.exe   dist\desgrana\
          copy /Y qt\build\DesgranaBridge.dll dist\desgrana\
          rem Qt DLLs + platform plugin, gathered by scanning the linked exe.
          rem --no-opengl-sw drops opengl32sw.dll (~20 MB software GL), --no-system-d3d-compiler
          rem drops d3dcompiler — neither is used by a plain Widgets app.
          windeployqt --release --no-translations --no-opengl-sw --no-system-d3d-compiler dist\desgrana\desgrana-gui.exe
          rem Swift runtime DLLs: only those actually reached (dependency walk).
          pwsh -NoProfile -File packaging\win\collect-swift-dlls.ps1

      - name: Smoke test (headless launch)
        shell: pwsh
        run: |
          $env:QT_QPA_PLATFORM = 'offscreen'
          $p = Start-Process -FilePath dist\desgrana\desgrana-gui.exe -PassThru -WindowStyle Hidden
          Start-Sleep -Seconds 5
          if ($p.HasExited) {
            if ($p.ExitCode -ne 0) { throw "desgrana-gui exited early with code $($p.ExitCode) — a runtime DLL is likely missing" }
          } else {
            Stop-Process -Id $p.Id -Force
            Write-Host "desgrana-gui launched and stayed alive — all runtime DLLs resolve."
          }

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          $ver = (Get-Content VERSION -Raw).Trim()
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { choco install innosetup -y --no-progress }
          & $iscc /DAppVersion=$ver /DBundleDir="$PWD\dist\desgrana" /DOutDir="$PWD\dist" packaging\win\desgrana.iss

      - name: Upload portable bundle
        uses: actions/upload-artifact@v7
        with:
          name: desgrana-${{ github.run_id }}-windows-gui
          path: dist/desgrana

      - name: Upload installer
        uses: actions/upload-artifact@v7
        with:
          name: desgrana-${{ github.run_id }}-windows-setup
          path: dist/desgrana-*-setup.exe

  # ── Windows core tests (CLI, x64) ───────────────────────────────────────────
  # Builds the CLI only to run the byte-exact split tests on Windows — a fast
  # functional check of the shared Core (WAV, SE_LOG, snap, markers, bext, iXML),
  # the same paths the GUI reaches through the bridge. Not shipped: no artifact.
  windows-test:
    name: Windows core tests (CLI, x64)
    if: github.event_name != 'workflow_dispatch' || inputs.only == 'all' || inputs.only == 'windows'
    runs-on: windows-latest
    steps:
      - uses: compnerd/gha-setup-swift@main
        with:
          swift-version: swift-6.4.x-branch
          swift-build: 6.4.x-DEVELOPMENT-SNAPSHOT-2026-06-01-a

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate BuildInfo.swift
        shell: bash
        run: |
          mkdir -p desgrana/Sources/Core
          cat > desgrana/Sources/Core/BuildInfo.swift <<EOF
          // Generated in CI — do not edit.
          public enum BuildInfo {
              public static let version = "$(cat VERSION)"
              public static let gitSHA = "$(git rev-parse HEAD)"
              public static let gitDescribe = "$(git describe --tags --always --dirty)"
              public static let gitDirty = false
              public static let buildDate = "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
              public static let swiftVersion = "$(swift --version | head -1 | tr -d '"\\')"
              public static let toolchain = "x86_64-unknown-windows-msvc"
          }
          EOF

      - name: Build CLI
        shell: bash
        run: cd desgrana && swift build -c release --product desgrana

      - name: Run split tests
        shell: bash
        run: python desgrana/Tests/test_split.py desgrana/.build/release/desgrana.exe
