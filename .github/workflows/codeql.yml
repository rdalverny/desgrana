name: CodeQL

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '35 6 * * 1'  # weekly, Monday morning

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ matrix.os }}
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
            os: ubuntu-latest
          - language: c-cpp
            build-mode: none
            os: ubuntu-latest
          - language: python
            build-mode: none
            os: ubuntu-latest
          - language: swift
            build-mode: manual
            os: macos-15

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Build Swift package
        if: matrix.build-mode == 'manual'
        run: |
          make buildinfo
          swift build --package-path desgrana

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:${{ matrix.language }}'
