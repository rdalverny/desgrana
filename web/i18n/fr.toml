[meta]
title = "Desgrana - De la session au mix : extraire un multipiste Behringer Wing/X32"
keywords = "desgrana, wav, multipiste, demux, extraction, Behringer Wing, Wing Rack, Wing Compact, Behringer X32, Midas M32, multipiste, WAV, enregistrement live, enregistrement concert, session, extraction audio, séparer pistes, post-production, Logic Pro, Reaper, DAW, open source, macOS, linux"
description = "Application gratuite pour macOS et Linux qui extrait les enregistrements multipistes Behringer Wing et X32 en pistes WAV séparées et nommées, prêtes à l'emploi dans un DAW. Open source, licence MIT."
og_title = "Desgrana — Extracteur multipiste Behringer Wing/X32"

jsonld_description = "Extrait les enregistrements multipistes WAV Behringer Wing/X32 en pistes mono ou stéréo séparées et nommées, prêtes pour n'importe quel DAW."

[hero]
title_main = "Desgrana"
tagline    = "Extraire un enregistrement live Behringer Wing ou X32 en pistes nommées, prêtes pour votre DAW."

[download]
macos_label = "Télécharger Desgrana {v} pour macOS"
