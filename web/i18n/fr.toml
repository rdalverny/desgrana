[situation]
heading = "La situation"
paragraphs = [
  "Quand une session est enregistrée avec une Behringer Wing ou X32 sur une carte SD, elle aboutit dans un fichier WAV multipistes.",
  "La plupart des stations audio (Logic Pro, Pro Tools, Ableton Live et tant d'autres) ne savent pas encore l'ouvrir directement en pistes séparées : vous obtenez au mieux une piste stéréo, ou rien. Reaper se débrouille mieux, mais les pistes restent anonymes et toutes séparées.",
  "Desgrana lit la session complète, sépare chaque canal en une piste mono ou stéréo, récupère les noms de canaux depuis le snapshot de votre console, et dépose le tout dans un dossier que votre DAW peut charger immédiatement.",
]

[features]
heading = "Avec Desgrana"
items = [
  "Déposez le dossier de la session, cliquez : c'est prêt.",
  "Le son de chaque piste reste intact&nbsp;: pas de conversion, pas de rééchantillonnage.",
  "Les noms des pistes et les paires stéréo sont récupérés et appliqués automatiquement.",
  "Seules les pistes réellement enregistrées apparaissent.",
  "Les sessions longues sur plusieurs fichiers (de 4 Go) sont réarrangées en pistes continues.",
  "Les marqueurs de session sont également récupérés (chunks cue dans le WAV ou fichier MIDI).",
  "Ça fonctionne aussi avec n'importe quel autre WAV multipiste.",
]

[faq]
heading = "FAQ"

[[faq.items]]
q = "Pourquoi je ne peux pas ouvrir mon enregistrement Wing ou X32 directement dans Logic Pro ou Reaper ?"
a_html = '''<p>La carte écrit un seul WAV multicanal entrelacé.
        Logic Pro l'importe en stéréo ; Reaper sait l'éclater en pistes, mais elles ressortent
        numérotées et sans nom. Desgrana le découpe en WAV nommés, organise les pistes stéréo ou mono, prêtes pour n'importe quel DAW.</p>'''

[[faq.items]]
id = "platforms"
q = "Quelles plateformes sont supportées ?"
a_html = '''<p>Desgrana est disponible pour macOS 13+ et Linux (Debian/Ubuntu 12+, Fedora 41+).</p>
        <p>Pas de version Windows prévue pour l'instant.
          Voir <a href="https://github.com/rdalverny/desgrana/blob/main/CONTRIBUTING.md">CONTRIBUTING</a>.</p>'''

[[faq.items]]
q = "Quelles consoles sont supportées ?"
a_html = '''
        <table>
          <tr><td>Behringer Wing (et Rack, Compact)</td><td>✅ Testée</td></tr>
          <tr><td>Behringer X32</td><td rowspan="2">Expérimental</td></tr>
          <tr><td>Midas M32</td></tr>
        </table>
        <p><a href="https://github.com/rdalverny/desgrana/issues/9">Vos retours sont les bienvenus</a>.</p>'''

[[faq.items]]
q = "Ai-je besoin du fichier <code>.snap</code> ou <code>SE_LOG.bin</code> ?"
a_html = '''<p>Non. Sans eux, Desgrana extrait quand même chaque voie en fichier mono numéroté.</p>
        <p>Avec, vous avez plus : <code>SE_LOG.bin</code> apporte les marqueurs et le nombre exact
        de pistes ; le snapshot (<code>.snap</code> Wing / <code>.scn</code> X32) nomme les pistes et
        détecte les paires stéréo. Déposez l'un ou l'autre dans le dossier de session, il est
        récupéré automatiquement.</p>'''

[[faq.items]]
q = "Les marqueurs de session sont-ils conservés ?"
a_html = '''<p>Oui. Intégrés en chunks <code>cue</code> dans chaque WAV et exportés en fichier MIDI
        (plus CSV et texte).
        Importez le MIDI : ils se placent au bon endroit dans votre DAW,
        quel que soit le tempo du projet.</p>'''

[[faq.items]]
q = "Est-ce que ça envoie des données en ligne ?"
a_html = '''<p>Non, ça fonctionne en local, sur votre machine.</p>
        <p>La seule requête sortante
          est une vérification de mise à jour une fois par mois,
          que vous pouvez désactiver dans les réglages de l'application.</p>'''

[[faq.items]]
q = "Puis-je renommer les pistes avant de les extraire ?"
a_html = '''<p>Les noms viennent du snapshot de la console. Corrigez-les sur la console, ou dans
      votre DAW après import. Desgrana ne fait que découper la session pour la rendre digeste.</p>'''

[[faq.items]]
q = "J'enregistre directement dans Reaper depuis ma console, ai-je besoin de Desgrana ?"
a_html = '''<p>Pas pour cette session-là : Reaper enregistre les pistes individuelles directement, déjà séparées.</p>
        <p>Desgrana est utile si vous faites aussi tourner une W-Live ou X-Live comme backup simultané,
        si vous recevez des sessions enregistrées par quelqu'un d'autre sur une Wing ou X32 sans ordinateur,
        ou si vous devez accéder à des sessions archivées d'un concert précédent.</p>'''

[[faq.items]]
q = "Une autre question ?"
a_html = '''N'hésitez pas à me contacter
        <a href="https://github.com/rdalverny/desgrana">sur GitHub</a>
        ou <a href="mailto:rwx@romaindalverny.com">par e-mail</a>.'''

[changelog]
heading = "Nouveautés"

[[changelog.items]]
version = "1.10.0"
date = "18 juin 2026"
notes_html = '''Support des fichiers WAV multicanaux directs, avec noms de pistes iXML.<br>
          Export de session DAW sous Linux (Reaper, Ardour, Audacity).<br>
          Avertissement espace disque insuffisant avant extraction.<br>
          La drop zone de dépôt ouvre aussi un sélecteur de fichier/dossier.'''

[[changelog.items]]
version = "1.9.0"
date = "28 mai 2026"
notes_html = "Nouvelle logique de paires stéréo. Changement cassant : suppression du flag autoStereo."

[[changelog.items]]
version = "1.8.1"
date = "26 mai 2026"
notes_html = "Détection correcte des paires stéréo USB de la Wing."

[[changelog.items]]
version = "1.8"
date = "13 mai 2026"
notes_html = '''Linux : interface (Qt) et CLI, packagées en .deb (amd64/arm64) et .rpm (x86_64/aarch64).<br>
          Support X32/M32 expérimental.<br>
          Avertissement si le dossier de sortie existe déjà.'''

[[changelog.items]]
version = "1.7"
date = "8 mai 2026"
notes_html = '''Interface simplifiée.<br>
          Noms de fichiers courts et auto-stéréo activés par défaut.<br>
          Fenêtre de préférences (⌘,) : dossier de sortie, style de nommage,
          intervalle de vérification des mises à jour (hebdomadaire / mensuel / 6 mois).<br>
          CLI : flags <code>--auto-stereo</code> et <code>--short-names</code> ;
          extrait toutes les pistes en mono par défaut.'''

[[changelog.items]]
version = "1.6.5"
date = "2 mai 2026"
notes_html = '''Première version publique sur GitHub.<br>
          Site déplacé vers romaindalverny.com.'''

[[changelog.items]]
version = "1.6"
date = "24 avr. 2026"
notes_html = '''Extraction byte-exact — aucune conversion, aucune perte de précision quelle que soit la profondeur de bits.<br>
          Installeur DMG.<br>
          Vérification silencieuse des mises à jour.<br>
          Ouvre la session extraite directement dans Logic Pro ou Reaper.'''

[[changelog.items]]
version = "1.5"
date = "21 avr. 2026"
notes_html = '''Dossier de sortie sur le Bureau par défaut (configurable).<br>
          Nom de session auto-détecté et éditable.<br>
          Option de nom de fichier court (<code>KICK.wav</code> au lieu de <code>Session_ch01_KICK.wav</code>).<br>
          Édition manuelle des paires stéréo avant export.<br>
          Correction de la détection des paires stéréo depuis le snapshot Wing.'''

[[changelog.items]]
version = "1.2 – 1.4"
date = "18–20 avr. 2026"
notes_html = '''Séparation des sessions multicanal en pistes individuelles.<br>
          Export de marqueurs : chunks cue WAV, CSV, fichier MIDI standard
          (SMF type 0, SMPTE 25 fps — s'importe dans Logic Pro).<br>
          Support SE_LOG.bin et snapshot Wing, glisser-déposer.<br>
          Interface plus propre. Détail du résultat affiché après export.'''

[roadmap]
heading = "Feuille de route"
